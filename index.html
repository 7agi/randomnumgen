<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>random number generator</title>
    <link rel="stylesheet" href="style.css?v=20260413">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>random number generator</h1>
        </header>

        <main>
            <!-- Music Section -->
            <section id="section-music">
                <div class="section-header">
                    <h2>music scale</h2>
                    <div class="toggle-group">
                        <label class="switch">
                            <input type="checkbox" id="lock-scale">
                            <span class="slider"></span>
                        </label>
                        <span>lock scale</span>
                    </div>
                </div>

                <!-- Scale Display -->
                <div class="display-area">
                    <div id="scale-display">---</div>
                    <div id="scale-notes">---</div>
                </div>

                <!-- Scale Controls: Randomize + Choose -->
                <div class="scale-controls">
                    <button id="btn-random-scale">randomize</button>
                    <div class="scale-picker">
                        <select id="select-key">
                            <option value="C">C</option>
                            <option value="C#">C#</option>
                            <option value="D">D</option>
                            <option value="D#">D#</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="F#">F#</option>
                            <option value="G">G</option>
                            <option value="G#">G#</option>
                            <option value="A">A</option>
                            <option value="A#">A#</option>
                            <option value="B">B</option>
                        </select>
                        <select id="select-type">
                            <option value="Major">major</option>
                            <option value="Minor">minor</option>
                        </select>
                        <button id="btn-set-scale">set scale</button>
                    </div>
                </div>
            </section>

            <!-- RNG Section -->
            <section id="section-rng">
                <div class="section-header">
                    <h2>random number settings</h2>
                    <div class="toggle-group">
                        <label class="switch">
                            <input type="checkbox" id="no-repeats">
                            <span class="slider"></span>
                        </label>
                        <span>no repeats</span>
                        <span id="no-repeats-status"></span>
                    </div>
                </div>
                <div class="controls-grid">
                    <div class="control-group">
                        <label>min</label>
                        <input type="number" id="input-min" value="1">
                    </div>
                    <div class="control-group">
                        <label>max</label>
                        <input type="number" id="input-max" value="7">
                    </div>
                    <div class="control-group">
                        <label>cols</label>
                        <input type="number" id="input-cols" value="4">
                    </div>
                    <div class="control-group">
                        <label>rows</label>
                        <input type="number" id="input-rows" value="1">
                    </div>
                </div>
                <button id="btn-generate" class="primary">generate</button>
            </section>

            <!-- Results Section (Side-by-Side) -->
            <section class="side-layout">
                <div id="grid-container"></div>
                <div id="translation-container"></div>
            </section>
        </main>
    </div>
    <script src="app.js?v=20260413"></script>
</body>
</html>
